<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Docentes - Colegio Claretiano de Huancayo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">Colegio Claretiano<br>de Huancayo</div>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="students.html">Estudiantes</a>
                <a href="teachers.html">Docentes</a>
                <a href="courses.html">Cursos</a>
                <a href="grades.html">Grados</a>
                <a href="sections.html">Secciones</a>
                <a href="notes.html">Notas</a>
            </nav>
        </aside>

        <div class="main">
            <header class="topbar">
                <div class="page-title">Docentes</div>
                <div class="user-info">
                    <span id="currentUserName"></span>
                    <span class="badge" id="currentUserRole"></span>
                    <button class="btn btn-secondary btn-sm" id="logoutBtn">Cerrar sesión</button>
                </div>
            </header>

            <div class="content">
                <div class="content-header">
                    <h2>Lista de docentes</h2>
                    <button class="btn btn-primary" id="addTeacherBtn">Agregar docente</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>DNI</th>
                                <th>Nombre completo</th>
                                <th>Cursos</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="teachersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="teacherModal">
        <div class="modal">
            <h2 id="teacherModalTitle">Agregar docente</h2>
            <div id="teacherError" class="alert alert-error"></div>
            <form id="teacherForm">
                <div class="form-group">
                    <label for="teacherCode">Código</label>
                    <input type="text" id="teacherCode" required placeholder="Ej: D001">
                </div>
                <div class="form-group">
                    <label for="teacherDni">DNI</label>
                    <input type="text" id="teacherDni" required>
                </div>
                <div class="form-group">
                    <label for="teacherFirstName">Nombres</label>
                    <input type="text" id="teacherFirstName" required>
                </div>
                <div class="form-group">
                    <label for="teacherLastName">Apellidos</label>
                    <input type="text" id="teacherLastName" required>
                </div>
                <div class="form-group">
                    <label>Cursos asignados</label>
                    <div class="checkbox-list" id="teacherCoursesList"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelTeacherBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/teachers.js"></script>
</body>
</html>
